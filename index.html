<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IBNET TELECOM — Plataforma Interna</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;
  --accent:#E8390E;--accent2:#CC2200;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --text:#e2e8f0;--muted:#94a3b8;
  --sidebar-w:230px;--font:'Segoe UI',system-ui,sans-serif;
  --brand-gradient:linear-gradient(135deg,#CC2200,#FF5500);
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* ── LOGIN ─────────────────────────────────────────────────────────────── */
#login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:9999
}
#login-screen.hidden{display:none}
.login-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;width:100%;max-width:380px;
  display:flex;flex-direction:column;gap:20px;
  box-shadow:0 24px 64px rgba(0,0,0,.5)
}
.login-logo{display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.login-logo img{width:180px;height:auto}
.login-logo-text h2{font-size:17px;font-weight:700}
.login-logo-text p{font-size:12px;color:var(--muted)}
.login-box h3{font-size:20px;font-weight:600}
.lf{display:flex;flex-direction:column;gap:6px}
.lf label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.lf input{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:8px;font-size:14px;font-family:var(--font);
  transition:border-color .2s
}
.lf input:focus{outline:none;border-color:var(--accent)}
.login-err{
  font-size:13px;color:var(--red);background:rgba(239,68,68,.1);
  border-radius:8px;padding:10px 14px;display:none
}
.login-err.show{display:block}
.btn-login{
  background:var(--accent);border:none;color:#fff;
  padding:12px;border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:background .2s
}
.btn-login:hover{background:#2563eb}
.forgot-link{text-align:center;font-size:12px;color:var(--muted);margin-top:-8px}
.forgot-link span{color:var(--accent);text-decoration:underline;cursor:pointer}
.forgot-link span:hover{opacity:.8}

/* ── RESET MODAL ────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  display:flex;align-items:center;justify-content:center;z-index:10000;
  opacity:0;pointer-events:none;transition:opacity .2s
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:32px 28px;width:100%;max-width:360px;
  display:flex;flex-direction:column;gap:16px;
  box-shadow:0 24px 64px rgba(0,0,0,.6)
}
.modal-title{font-size:16px;font-weight:700}
.modal-desc{font-size:13px;color:var(--muted);line-height:1.5}
.modal-msg{font-size:13px;padding:10px 14px;border-radius:8px;display:none}
.modal-msg.ok{display:block;background:rgba(34,197,94,.1);color:var(--green)}
.modal-msg.err{display:block;background:rgba(239,68,68,.1);color:var(--red)}
.modal-actions{display:flex;gap:8px}
.btn-modal-cancel{
  flex:1;background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:10px;border-radius:8px;font-size:13px;
  cursor:pointer;font-family:var(--font)
}
.btn-modal-cancel:hover{border-color:var(--red);color:var(--red)}
.btn-modal-send{
  flex:2;background:var(--accent);border:none;color:#fff;
  padding:10px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--font)
}
.btn-modal-send:hover{opacity:.85}
.btn-modal-send:disabled{opacity:.5;cursor:default}

/* ── PLATFORM SHELL ────────────────────────────────────────────────────── */
#platform{display:none;height:100vh;overflow:hidden}
#platform.show{display:flex}

/* ── SIDEBAR ───────────────────────────────────────────────────────────── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:#0d1018;border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow-y:auto
}
.sb-brand{
  padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.sb-brand img{width:130px;height:auto}
.sb-brand-text{line-height:1.3}
.sb-brand-text strong{font-size:13px;font-weight:700;display:block}
.sb-brand-text span{font-size:10px;color:var(--muted)}
.sb-section{padding:12px 10px 4px;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;border-radius:8px;margin:2px 8px;
  cursor:pointer;font-size:13px;font-weight:500;
  color:var(--muted);transition:all .15s;text-decoration:none;
  border:none;background:none;width:calc(100% - 16px);text-align:left
}
.sb-item:hover{background:rgba(59,130,246,.08);color:var(--text)}
.sb-item.active{background:rgba(59,130,246,.15);color:var(--accent);font-weight:600}
.sb-item svg{flex-shrink:0;opacity:.7}
.sb-item.active svg{opacity:1}
.sb-lock{margin-left:auto;font-size:10px;opacity:.5}
.sb-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--brand-gradient);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0
}
.sb-user-info strong{font-size:12px;display:block}
.sb-user-info span{font-size:10px;color:var(--muted)}
.btn-logout{
  width:100%;background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:8px;border-radius:8px;font-size:12px;
  cursor:pointer;font-family:var(--font);transition:all .2s
}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* ── LIGHT THEME ────────────────────────────────────────────────────────── */
body.light{--bg:#f0f4f8;--card:#ffffff;--border:#dde3ed;--text:#1e293b;--muted:#64748b}
body.light #sidebar{background:#f8fafc}
body.light #topbar{background:#ffffff}
body.light #login-screen{background:var(--bg)}
body.light .login-box{background:#ffffff}
body.light .lf input{background:var(--bg)}
body.light .sb-brand{border-bottom-color:var(--border)}
body.light .sb-footer{border-top-color:var(--border)}
body.light .sb-item:hover{background:rgba(232,57,14,.07);color:var(--text)}
body.light .sb-item.active{background:rgba(232,57,14,.12);color:var(--accent)}

/* ── TOPBAR BUTTONS ─────────────────────────────────────────────────────── */
.tb-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px;
  transition:all .15s;white-space:nowrap
}
.tb-btn:hover{border-color:var(--accent);color:var(--text)}
.tb-btn-danger:hover{border-color:var(--red)!important;color:var(--red)!important}

/* ── SUGGESTIONS MODAL ──────────────────────────────────────────────────── */
.sug-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  display:flex;align-items:center;justify-content:center;z-index:10000;
  opacity:0;pointer-events:none;transition:opacity .2s
}
.sug-overlay.show{opacity:1;pointer-events:auto}
.sug-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:520px;max-height:82vh;
  display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,.6);overflow:hidden
}
.sug-head{padding:20px 24px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column}
.sug-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sug-head h3{font-size:16px;font-weight:700}
.sug-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:0 6px;border-radius:6px;font-family:var(--font);line-height:1}
.sug-close:hover{background:rgba(239,68,68,.1);color:var(--red)}
.sug-tabs{display:flex}
.sug-tab{
  padding:8px 18px 12px;font-size:13px;font-weight:500;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:var(--font);transition:all .15s
}
.sug-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sug-body{padding:20px 24px;overflow-y:auto;flex:1}
.sug-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.sug-field label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sug-field input,.sug-field textarea,.sug-field select{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:8px;font-size:13px;font-family:var(--font);
  transition:border-color .2s;resize:vertical
}
.sug-field input:focus,.sug-field textarea:focus,.sug-field select:focus{outline:none;border-color:var(--accent)}
.sug-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid var(--border);flex-shrink:0}
.btn-sug-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font)}
.btn-sug-cancel:hover{border-color:var(--red);color:var(--red)}
.btn-sug-send{background:var(--accent);border:none;color:#fff;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-sug-send:hover{opacity:.85}
.btn-sug-send:disabled{opacity:.5;cursor:default}
.sug-msg{font-size:13px;padding:10px 14px;border-radius:8px;display:none;margin-bottom:12px}
.sug-msg.ok{display:block;background:rgba(34,197,94,.1);color:var(--green)}
.sug-msg.err{display:block;background:rgba(239,68,68,.1);color:var(--red)}
.sug-list{display:flex;flex-direction:column;gap:10px}
.sug-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.sug-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.sug-item-title{font-size:13px;font-weight:600;flex:1}
.sug-item-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.sug-item-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sug-badge{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.sug-badge-sug{background:rgba(99,102,241,.15);color:#818cf8}
.sug-badge-bug{background:rgba(239,68,68,.15);color:#ef4444}
.sug-badge-pend{background:rgba(234,179,8,.15);color:#eab308}
.sug-badge-exec{background:rgba(59,130,246,.15);color:#3b82f6}
.sug-badge-done{background:rgba(34,197,94,.15);color:#22c55e}
.sug-status-sel{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font)}
.sug-empty{text-align:center;color:var(--muted);font-size:13px;padding:28px}
.sug-count{font-size:11px;background:rgba(232,57,14,.15);color:var(--accent);border-radius:10px;padding:1px 7px;font-weight:700;margin-left:2px}

/* ── CONTENT AREA ──────────────────────────────────────────────────────── */
#content-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-panel{display:none;width:100%;height:100%}
.tab-panel.active{display:flex;flex-direction:column}
.tab-panel iframe{border:none;flex:1;width:100%}

/* ── TOPBAR ────────────────────────────────────────────────────────────── */
#topbar{
  height:52px;min-height:52px;
  background:#0d1018;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:12px
}
#topbar h2{font-size:14px;font-weight:600;color:var(--text)}
#topbar span{font-size:12px;color:var(--muted)}
.topbar-badge{
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(59,130,246,.15);color:var(--accent)
}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#topbar-user{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="logo.jpeg" alt="IBnet Telecom"/>
    </div>
    <h3>Bem-vindo</h3>
    <div class="lf">
      <label>Usuário</label>
      <input type="text" id="li-user" placeholder="seu usuário" autocomplete="username"/>
    </div>
    <div class="lf">
      <label>Senha</label>
      <input type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div class="login-err" id="li-err">Usuário ou senha incorretos.</div>
    <button class="btn-login" id="btn-login">Entrar</button>
    <div class="forgot-link">Esqueceu a senha? <span onclick="openResetModal()">Recuperar acesso</span></div>
  </div>
</div>

<!-- MODAL RECUPERAR ACESSO -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal-box">
    <div class="modal-title">Recuperar Acesso</div>
    <div class="modal-desc">Informe seu usuário e enviaremos a senha para o e-mail cadastrado.</div>
    <div class="lf">
      <label>Usuário</label>
      <input type="text" id="reset-user" placeholder="seu usuário" autocomplete="off"/>
    </div>
    <div class="modal-msg" id="reset-msg"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeResetModal()">Cancelar</button>
      <button class="btn-modal-send" id="btn-reset-send" onclick="sendReset()">Enviar</button>
    </div>
  </div>
</div>

<!-- MODAL SUGESTÕES -->
<div class="sug-overlay" id="sug-overlay">
  <div class="sug-box">
    <div class="sug-head">
      <div class="sug-head-row">
        <h3>💡 Sugestões &amp; Bugs</h3>
        <button class="sug-close" onclick="closeSugestoes()">×</button>
      </div>
      <div class="sug-tabs">
        <button class="sug-tab active" data-tab="nova" onclick="switchSugTab('nova')">Nova</button>
        <button class="sug-tab" data-tab="lista" onclick="switchSugTab('lista')">Ver Todas</button>
      </div>
    </div>
    <div class="sug-body">
      <div id="sug-pane-nova">
        <div class="sug-msg" id="sug-msg"></div>
        <div class="sug-field">
          <label>Tipo</label>
          <select id="sug-tipo">
            <option value="sugestao">💡 Sugestão de Melhoria</option>
            <option value="bug">🐛 Reportar Erro</option>
          </select>
        </div>
        <div class="sug-field">
          <label>Título</label>
          <input type="text" id="sug-titulo" placeholder="Descreva brevemente…"/>
        </div>
        <div class="sug-field">
          <label>Detalhes (opcional)</label>
          <textarea id="sug-desc" rows="4" placeholder="Explique com mais detalhes…"></textarea>
        </div>
      </div>
      <div id="sug-pane-lista" style="display:none">
        <div class="sug-list" id="sug-lista-items"></div>
      </div>
    </div>
    <div class="sug-foot">
      <button class="btn-sug-cancel" onclick="closeSugestoes()">Fechar</button>
      <button class="btn-sug-send" id="btn-sug-send" onclick="submitSugestao()">Registrar</button>
    </div>
  </div>
</div>

<!-- PLATFORM -->
<div id="platform">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-brand">
      <img src="logo.jpeg" alt="IBnet Telecom"/>
    </div>

    <div class="sb-section">Dashboards</div>

    <button class="sb-item active" data-tab="comercial">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M3 9h18M9 21V9"/></svg>
      Comercial
    </button>

    <button class="sb-item" data-tab="financeiro" id="sb-financeiro">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Financeiro
      <span class="sb-lock" id="fin-lock">🔒</span>
    </button>

    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <div class="sb-user-info">
          <strong id="sb-username">—</strong>
          <span id="sb-role-label">—</span>
        </div>
      </div>
      <button class="btn-logout" id="btn-logout">Sair da plataforma</button>
    </div>
  </aside>

  <!-- Content -->
  <div id="content-area">
    <div id="topbar">
      <h2 id="topbar-title">Dashboard Comercial</h2>
      <span class="topbar-badge" id="topbar-badge">COMERCIAL</span>
      <div id="topbar-right">
        <span id="topbar-user"></span>
        <button class="tb-btn" id="btn-theme" onclick="toggleTheme()">☀️ Claro</button>
        <button class="tb-btn" id="btn-sugestoes" onclick="openSugestoes()">💡 Sugestões</button>
        <button class="tb-btn tb-btn-danger" onclick="doLogout()">⏏ Sair</button>
      </div>
    </div>

    <div class="tab-panel active" id="tab-comercial">
      <iframe src="comercial/index.html" id="iframe-comercial" title="Dashboard Comercial"></iframe>
    </div>

    <div class="tab-panel" id="tab-financeiro">
      <iframe src="financeiro/index.html" id="iframe-financeiro" title="Painel Financeiro"></iframe>
    </div>
  </div>
</div>

<script>
// ── USERS & ROLES ─────────────────────────────────────────────────────────
const USERS = {
  'igor':    { senha: 'Comdata12@', role: 'admin',     nome: 'Igor',    email: 'igorbonifacio23@gmail.com' },
  'matheus': { senha: 'Ibnet@2026', role: 'comercial', nome: 'Matheus', email: 'matheushenrique161013@gmail.com' },
};

const ROLE_ACCESS = {
  admin:      ['comercial', 'financeiro'],
  financeiro: ['comercial', 'financeiro'],
  comercial:  ['comercial'],
};

const ROLE_LABELS = {
  admin: 'Administrador', financeiro: 'Financeiro', comercial: 'Comercial'
};

const TAB_META = {
  comercial:  { title: 'Dashboard Comercial',  badge: 'COMERCIAL' },
  financeiro: { title: 'Painel Financeiro',    badge: 'FINANCEIRO' },
};

// ── AUTH ──────────────────────────────────────────────────────────────────
function getSession() {
  try { return JSON.parse(sessionStorage.getItem('ibnet_session') || 'null'); } catch { return null; }
}
function setSession(u) { sessionStorage.setItem('ibnet_session', JSON.stringify(u)); }
function clearSession() { sessionStorage.removeItem('ibnet_session'); }

function canAccess(role, tab) {
  return (ROLE_ACCESS[role] || []).includes(tab);
}

// ── LOGIN ─────────────────────────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('li-user').value.trim().toLowerCase();
  const p = document.getElementById('li-pass').value;
  const err = document.getElementById('li-err');
  const user = USERS[u];
  if (user && user.senha === p) {
    setSession({ username: u, role: user.role, nome: user.nome });
    err.classList.remove('show');
    bootPlatform({ username: u, role: user.role, nome: user.nome });
  } else {
    err.classList.add('show');
    document.getElementById('li-pass').value = '';
  }
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('li-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('li-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('li-pass').focus(); });

// ── PLATFORM BOOT ─────────────────────────────────────────────────────────
let currentTab = 'comercial';

function bootPlatform(session) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('platform').classList.add('show');

  // User info in sidebar
  document.getElementById('sb-username').textContent = session.nome;
  document.getElementById('sb-role-label').textContent = ROLE_LABELS[session.role] || session.role;
  document.getElementById('sb-avatar').textContent = session.nome[0].toUpperCase();
  document.getElementById('topbar-user').textContent = 'Olá, ' + session.nome;

  // Show/hide financeiro based on role
  const hasFin = canAccess(session.role, 'financeiro');
  const sbFin = document.getElementById('sb-financeiro');
  const finLock = document.getElementById('fin-lock');
  if (hasFin) {
    finLock.style.display = 'none';
    sbFin.style.opacity = '1';
    sbFin.style.pointerEvents = 'auto';
  } else {
    sbFin.style.opacity = '.4';
    sbFin.style.pointerEvents = 'none';
  }

  switchTab('comercial');
}

function switchTab(tab) {
  const session = getSession();
  if (!session || !canAccess(session.role, tab)) return;

  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));

  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`.sb-item[data-tab="${tab}"]`).classList.add('active');

  const meta = TAB_META[tab];
  document.getElementById('topbar-title').textContent = meta.title;
  document.getElementById('topbar-badge').textContent = meta.badge;
  currentTab = tab;
}

document.querySelectorAll('.sb-item[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

document.getElementById('btn-logout').addEventListener('click', () => {
  clearSession();
  location.reload();
});

// ── LOGOUT ────────────────────────────────────────────────────────────────
function doLogout() { clearSession(); location.reload(); }

// ── THEME ─────────────────────────────────────────────────────────────────
let currentTheme = localStorage.getItem('ibnet_theme') || 'dark';

function applyTheme(t) {
  currentTheme = t;
  document.body.classList.toggle('light', t === 'light');
  const btn = document.getElementById('btn-theme');
  if (btn) btn.innerHTML = t === 'light' ? '🌙 Escuro' : '☀️ Claro';
  localStorage.setItem('ibnet_theme', t);
  ['iframe-comercial','iframe-financeiro'].forEach(id => {
    try { document.getElementById(id)?.contentWindow?.postMessage({type:'theme',value:t},'*'); } catch(e){}
  });
}

function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }

document.getElementById('iframe-comercial').addEventListener('load', () => applyTheme(currentTheme));
document.getElementById('iframe-financeiro').addEventListener('load', () => applyTheme(currentTheme));

// ── SUGGESTIONS ───────────────────────────────────────────────────────────
const SUG_KEY = 'ibnet_sugestoes';
function getSugestoes() { try { return JSON.parse(localStorage.getItem(SUG_KEY)||'[]'); } catch { return []; } }
function saveSugestoes(arr) { localStorage.setItem(SUG_KEY, JSON.stringify(arr)); }

function updateSugCount() {
  const session = getSession();
  const pending = getSugestoes().filter(s => s.status === 'pendente').length;
  const btn = document.getElementById('btn-sugestoes');
  if (!btn) return;
  btn.innerHTML = pending > 0 && session?.role === 'admin'
    ? `💡 Sugestões <span class="sug-count">${pending}</span>`
    : '💡 Sugestões';
}

function openSugestoes() {
  const msgEl = document.getElementById('sug-msg');
  msgEl.className = 'sug-msg'; msgEl.textContent = '';
  document.getElementById('sug-titulo').value = '';
  document.getElementById('sug-desc').value = '';
  const btn = document.getElementById('btn-sug-send');
  btn.disabled = false; btn.textContent = 'Registrar';
  switchSugTab('nova');
  document.getElementById('sug-overlay').classList.add('show');
}

function closeSugestoes() { document.getElementById('sug-overlay').classList.remove('show'); }

function switchSugTab(tab) {
  document.querySelectorAll('.sug-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('sug-pane-nova').style.display = tab === 'nova' ? '' : 'none';
  document.getElementById('sug-pane-lista').style.display = tab === 'lista' ? '' : 'none';
  document.getElementById('btn-sug-send').style.display = tab === 'nova' ? '' : 'none';
  if (tab === 'lista') renderSugList();
}

async function submitSugestao() {
  const session = getSession();
  const tipo   = document.getElementById('sug-tipo').value;
  const titulo = document.getElementById('sug-titulo').value.trim();
  const desc   = document.getElementById('sug-desc').value.trim();
  const msgEl  = document.getElementById('sug-msg');
  const btn    = document.getElementById('btn-sug-send');
  if (!titulo) { msgEl.className='sug-msg err'; msgEl.textContent='Informe um título.'; return; }

  const nova = {
    id: Date.now().toString(), tipo, titulo, descricao: desc,
    usuario: session?.nome || '—', status: 'pendente',
    data: new Date().toLocaleDateString('pt-BR')
  };
  const arr = getSugestoes(); arr.unshift(nova); saveSugestoes(arr);
  updateSugCount();

  btn.disabled = true; btn.textContent = 'Enviando…';
  try {
    if (typeof emailjs !== 'undefined' && EMAILJS_PUBLIC_KEY !== 'SEU_PUBLIC_KEY') {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email: 'igorbonifacio23@gmail.com', to_name: 'Igor',
        username: session?.nome || '—',
        assunto: `[${tipo === 'bug' ? 'Bug' : 'Sugestão'}] ${titulo}`,
        descricao: desc || '(sem descrição)',
      });
    }
  } catch(e) {}

  msgEl.className = 'sug-msg ok';
  msgEl.textContent = 'Registrado! Igor será notificado por e-mail.';
  btn.textContent = 'Enviado ✓';
}

function renderSugList() {
  const session = getSession();
  const arr = getSugestoes();
  const container = document.getElementById('sug-lista-items');
  if (!arr.length) { container.innerHTML = '<div class="sug-empty">Nenhuma sugestão registrada ainda.</div>'; return; }
  const stMap   = {pendente:'pend', em_execucao:'exec', corrigido:'done'};
  const stLabel = {pendente:'Pendente', em_execucao:'Em Execução', corrigido:'Corrigido'};
  container.innerHTML = arr.map(s => {
    const tipoBadge = s.tipo === 'bug'
      ? '<span class="sug-badge sug-badge-bug">Bug</span>'
      : '<span class="sug-badge sug-badge-sug">Sugestão</span>';
    const stControle = session?.role === 'admin'
      ? `<select class="sug-status-sel" onchange="changeSugStatus('${s.id}',this.value)">
           <option value="pendente"${s.status==='pendente'?' selected':''}>Pendente</option>
           <option value="em_execucao"${s.status==='em_execucao'?' selected':''}>Em Execução</option>
           <option value="corrigido"${s.status==='corrigido'?' selected':''}>Corrigido</option>
         </select>`
      : `<span class="sug-badge sug-badge-${stMap[s.status]||'pend'}">${stLabel[s.status]||s.status}</span>`;
    return `<div class="sug-item">
      <div class="sug-item-top"><div class="sug-item-title">${s.titulo}</div>${tipoBadge}</div>
      ${s.descricao ? `<div class="sug-item-desc">${s.descricao}</div>` : ''}
      <div class="sug-item-meta"><span style="opacity:.6;font-size:11px">${s.usuario} · ${s.data}</span>${stControle}</div>
    </div>`;
  }).join('');
}

function changeSugStatus(id, newStatus) {
  const arr = getSugestoes();
  const item = arr.find(s => s.id === id);
  if (item) { item.status = newStatus; saveSugestoes(arr); updateSugCount(); renderSugList(); }
}

document.getElementById('sug-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSugestoes();
});

// ── AUTO LOGIN (session exists) ───────────────────────────────────────────
const existing = getSession();
if (existing && USERS[existing.username]) {
  bootPlatform(existing);
}

applyTheme(currentTheme);
updateSugCount();

// ── EMAILJS CONFIG ────────────────────────────────────────────────────────
const EMAILJS_PUBLIC_KEY  = 'SEU_PUBLIC_KEY';   // ← preencher após criar conta
const EMAILJS_SERVICE_ID  = 'SEU_SERVICE_ID';   // ← ID do serviço (Gmail etc.)
const EMAILJS_TEMPLATE_ID = 'SEU_TEMPLATE_ID';  // ← ID do template criado

emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

// ── MODAL RECUPERAR ACESSO ────────────────────────────────────────────────
function openResetModal() {
  document.getElementById('reset-user').value = '';
  const msgEl = document.getElementById('reset-msg');
  msgEl.className = 'modal-msg';
  msgEl.textContent = '';
  const btn = document.getElementById('btn-reset-send');
  btn.disabled = false;
  btn.textContent = 'Enviar';
  document.getElementById('reset-modal').classList.add('show');
  setTimeout(() => document.getElementById('reset-user').focus(), 100);
}

function closeResetModal() {
  document.getElementById('reset-modal').classList.remove('show');
}

async function sendReset() {
  const username = document.getElementById('reset-user').value.trim().toLowerCase();
  const msgEl = document.getElementById('reset-msg');
  const btn = document.getElementById('btn-reset-send');
  const user = USERS[username];

  if (!user || !user.email) {
    msgEl.className = 'modal-msg err';
    msgEl.textContent = 'Usuário não encontrado.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enviando…';
  msgEl.className = 'modal-msg';

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: user.email,
      to_name:  user.nome,
      username: username,
      senha:    user.senha,
    });
    msgEl.className = 'modal-msg ok';
    msgEl.textContent = 'Senha enviada para ' + user.email;
    btn.textContent = 'Enviado ✓';
  } catch(e) {
    msgEl.className = 'modal-msg err';
    msgEl.textContent = 'Falha ao enviar. Verifique as configurações do EmailJS.';
    btn.disabled = false;
    btn.textContent = 'Enviar';
  }
}

document.getElementById('reset-modal').addEventListener('click', function(e) {
  if (e.target === this) closeResetModal();
});

document.getElementById('reset-user').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendReset();
});
</script>
